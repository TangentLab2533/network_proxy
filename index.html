<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访问验证</title> 
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    .shake { animation: shake 0.4s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-950 via-slate-900 to-gray-950 flex items-center justify-center px-4">

  <!-- 密码验证层 -->
  <div id="gate" class="w-full max-w-sm fade-in">
    <div class="bg-slate-800/60 backdrop-blur-xl border border-slate-700/50 rounded-2xl p-8 shadow-2xl">

      <!-- 锁图标 -->
      <div class="flex justify-center mb-6">
        <div class="w-14 h-14 rounded-full bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center">
          <svg class="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
          </svg>
        </div>
      </div>

      <h1 class="text-xl font-bold text-white text-center mb-1">访问验证</h1>
      <p class="text-slate-400 text-sm text-center mb-6">本页面的存在是为了防止恶意扫描查出来我们的服务类型，从而导致页面被Ban<br>密码是"三四五八"的阿拉伯数字</p>

      <form id="authForm">
        <input
          type="password"
          id="pwd"
          placeholder="输入密码…"
          autofocus
          class="w-full px-4 py-2.5 bg-slate-900/60 border border-slate-600/50 rounded-xl text-white placeholder-slate-500 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30 transition-all"
        />
        <button
          type="submit"
          class="w-full mt-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-xl text-sm transition-colors"
        >进入</button>
      </form>

      <p id="err" class="hidden text-red-400 text-xs text-center mt-3">密码错误，请重试</p>
    </div>
  </div>

  <!-- 全屏 iframe 层 -->
  <div id="content" class="hidden fixed inset-0">
    <iframe class="w-full h-full border-0" src="myindex.html"></iframe>
  </div>

  <script>
    const SALT = 'LSDJFLKNVJAHUEFAKFLJDFJLSDJFLQOEFIHNV';
    const HASH = '56c9ee7e849fc7d176426930e71bfe3d4f662df4b430092fb21dd6318cc332a8';

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pwd = document.getElementById('pwd').value;
      if (!pwd) return;

      const hash = await sha256(pwd + SALT);
      if (hash === HASH) {
        document.getElementById('gate').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
      } else {
        const err = document.getElementById('err');
        const box = document.getElementById('gate');
        err.classList.remove('hidden');
        box.classList.add('shake');
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
        setTimeout(() => box.classList.remove('shake'), 400);
      }
    });
  </script>

</body>
</html>
