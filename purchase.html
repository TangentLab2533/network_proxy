<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

  <script src="i18n.js"></script>
  <script>
    // Dark mode toggle
    const themeToggle = document.getElementById('themeToggle');
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    }
    themeToggle?.addEventListener('click', toggleTheme);

    // Permanent plan modal
    function showPermanentModal() {
      document.getElementById('permanentModal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    function closePermanentModal() {
      document.getElementById('permanentModal').classList.add('hidden');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePermanentModal();
    });

    // Apply translations
    applyTranslations();
  </script>
